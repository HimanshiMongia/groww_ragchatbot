<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groww Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #E6F8F3 0%, #F5FCFA 50%, #FFFFFF 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            background: #fff;
        }

        @media (max-width: 400px) {
            .phone-container {
                border-radius: 0;
                box-shadow: none;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            background: linear-gradient(180deg, #E6F8F3 0%, #FFFFFF 100%);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
        }

        .search-icon {
            width: 40px;
            height: 40px;
            background-color: #F3F4F6;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4B5563;
        }

        .main-content {
            flex-grow: 1;
            padding: 0 24px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .greeting {
            font-size: 32px;
            font-weight: 600;
            color: #111827;
            line-height: 1.2;
            margin-top: 10px;
            margin-bottom: 24px;
        }

        .action-button {
            background-color: #00D09C;
            color: white;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 6px 16px rgba(0, 208, 156, 0.3);
            border: none;
            cursor: pointer;
        }

        .section-title {
            font-size: 14px;
            color: #6B7280;
            font-weight: 500;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
        }

        .suggestion {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background-color: white;
            border: 1px solid #F3F4F6;
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .suggestion:hover {
            border-color: #00D09C;
        }

        .suggestion-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-circle {
            width: 32px;
            height: 32px;
            background-color: #E6F8F3;
            color: #00D09C;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .suggestion-text {
            font-size: 15px;
            color: #374151;
            font-weight: 500;
        }

        .check-icon {
            color: #00D09C;
            background: #E6F8F3;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-area {
            display: none;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 20px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .message.user {
            background-color: #F3F4F6;
            color: #111827;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background-color: #E6F8F3;
            color: #111827;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            font-size: 15px !important;
            font-weight: 400 !important;
        }

        .message.bot p {
            margin: 0;
            font-size: 15px !important;
            font-weight: 400 !important;
            line-height: 1.4;
        }

        .message.bot h1,
        .message.bot h2,
        .message.bot h3,
        .message.bot h4,
        .message.bot h5,
        .message.bot h6 {
            font-size: 15px !important;
            font-weight: 400 !important;
            margin: 0;
            display: inline;
            /* Keep it feeling like a single message */
        }

        .footer {
            padding: 16px 24px 24px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, #F3FBF8 50%, #E6F8F3 100%);
            position: relative;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: white;
            border-radius: 30px;
            padding: 6px 6px 6px 16px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
            margin-bottom: 12px;
        }

        .input-wrapper input {
            flex-grow: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: #111827;
        }

        .input-wrapper input::placeholder {
            color: #9CA3AF;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background-color: #00D09C;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .disclaimer {
            text-align: center;
            font-size: 12px;
            color: #9CA3AF;
        }

        /* Utilities */
        .hidden {
            display: none !important;
        }

        /* Loader */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            background-color: #E6F8F3;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background-color: #00D09C;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Link colors in bot message */
        .message.bot a {
            color: #00D09C;
            text-decoration: none;
            font-weight: 500;
        }

        .message.bot hr {
            border: 0;
            border-top: 1px solid #D1FAE5;
            margin: 12px 0;
        }

        .message.bot p:last-child {
            font-size: 12px !important;
            color: #6B7280;
            margin-top: 5px;
            font-weight: 400 !important;
        }

        .message.bot strong {
            color: #00D09C;
            /* Use Groww green for highlighted data */
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="phone-container">
        <div class="header">
            <div class="logo">Groww</div>
            <div class="search-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>

        <div class="main-content" id="mainContent">

            <div id="homeView">
                <div class="greeting">Hi! I'm here to help<br>with your investment<br>questions</div>

                <button class="action-button">+ What do you want to learn today?</button>

                <div class="section-title">
                    <span>Suggested questions</span>
                </div>

                <div class="suggestion" onclick="sendQuery('What is the current NAV of HDFC Mid Cap Fund?')">
                    <div class="suggestion-left">
                        <div class="icon-circle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="16"></line>
                                <line x1="8" y1="12" x2="16" y2="12"></line>
                            </svg></div>
                        <span class="suggestion-text">What is the NAV of HDFC Mid Cap?</span>
                    </div>
                    <div class="check-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg></div>
                </div>

                <div class="suggestion" onclick="sendQuery('What is the exit load for Tata Small Cap Fund?')">
                    <div class="suggestion-left">
                        <div class="icon-circle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg></div>
                        <span class="suggestion-text">What is the exit load for Tata Small Cap?</span>
                    </div>
                    <div class="check-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg></div>
                </div>

                <div class="suggestion" onclick="sendQuery('What is the risk level of SBI ELSS Tax Saver?')">
                    <div class="suggestion-left">
                        <div class="icon-circle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="20" x2="18" y2="10"></line>
                                <line x1="12" y1="20" x2="12" y2="4"></line>
                                <line x1="6" y1="20" x2="6" y2="14"></line>
                            </svg></div>
                        <span class="suggestion-text">What is the risk level of SBI ELSS?</span>
                    </div>
                    <div class="check-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg></div>
                </div>
            </div>

            <div id="chatView" class="chat-area">
                <!-- Messages will appear here -->
            </div>

        </div>

        <div class="footer">
            <div class="input-wrapper">
                <div style="margin-right: 8px; color: #9CA3AF;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <input type="text" id="userInput" placeholder="Start typing your question"
                    onkeypress="if(event.key === 'Enter') sendInputQuery()">
                <button class="send-btn" onclick="sendInputQuery()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="disclaimer">Facts-only. No investment advice.</div>
        </div>
    </div>

    <!-- Minimal Markdown Parser for links -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const chatView = document.getElementById('chatView');
        const homeView = document.getElementById('homeView');
        const userInput = document.getElementById('userInput');
        const mainContent = document.getElementById('mainContent');

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            if (role === 'bot') {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.textContent = text;
            }

            chatView.appendChild(msgDiv);
            mainContent.scrollTop = mainContent.scrollHeight;
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typingIndicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chatView.appendChild(typing);
            mainContent.scrollTop = mainContent.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendQuery(queryText) {
            if (!queryText.trim()) return;

            homeView.classList.add('hidden');
            chatView.style.display = 'flex';

            appendMessage('user', queryText);
            userInput.value = '';

            showTyping();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryText })
                });

                const data = await response.json();
                hideTyping();
                appendMessage('bot', data.response);
            } catch (err) {
                hideTyping();
                appendMessage('bot', `Sorry, an error occurred: ${err}`);
            }
        }

        function sendInputQuery() {
            sendQuery(userInput.value);
        }
    </script>
</body>

</html>
